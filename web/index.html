<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>법령 검색</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page">
      <div class="app">
        <header class="header">
          <h1>법령 검색</h1>
          <p>발췌 조문을 검색해 답변합니다</p>
        </header>

        <main id="chat" class="chat">
          <div id="welcome" class="welcome">
            <strong>무엇이 궁금하신가요?</strong>
            법령 조문을 검색한 뒤, 찾은 내용을 근거로 답합니다.
            <div class="suggestions">
              <button type="button" class="suggestion">음주운전 하면 어떻게 되나요?</button>
              <button type="button" class="suggestion">면허 없이 운전하면 처벌되나요?</button>
              <button type="button" class="suggestion">길에서 소변을 보면 처벌되나요?</button>
            </div>
          </div>
        </main>

        <form id="composer" class="composer">
          <input
            id="question"
            type="text"
            placeholder="질문을 입력하세요"
            autocomplete="off"
          />
          <button id="send" type="submit" aria-label="전송" title="전송">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 12h12M13 6l6 6-6 6"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </form>

        <p class="footer">미니 RAG · 로컬 임베딩 + Ollama</p>
      </div>

      <aside class="sidebar">
        <section class="side-block">
          <h2>조 · 항</h2>
          <ul id="cite-list" class="cite-list">
            <li class="empty">검색 후 표시됩니다</li>
          </ul>
        </section>

        <section class="side-block grow">
          <h2>가져온 문서</h2>
          <ul id="doc-list" class="doc-list">
            <li class="empty">검색 후 표시됩니다</li>
          </ul>
        </section>

        <section class="side-block upload-block">
          <h2>PDF 업로드</h2>
          <label class="upload-zone" for="pdf-input">
            <span id="upload-label">PDF를 선택하거나 끌어다 놓기</span>
            <input id="pdf-input" type="file" accept="application/pdf,.pdf" hidden />
          </label>
          <p id="upload-status" class="upload-status"></p>
        </section>
      </aside>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
